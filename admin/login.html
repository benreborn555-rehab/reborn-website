<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה לניהול | Reborn</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans Hebrew", system-ui, sans-serif;
      direction: rtl;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 500px at 90% -10%, rgba(230,192,97,0.25), transparent 60%),
        linear-gradient(160deg, #211b11, #2a241b);
      color: #2a241b;
      padding: 20px;
    }
    .card {
      width: min(100%, 400px);
      background: #fff;
      border-radius: 22px;
      padding: 40px 34px;
      box-shadow: 0 30px 70px -25px rgba(0,0,0,0.6);
      border: 1px solid rgba(198,154,46,0.3);
      text-align: center;
    }
    .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 1px;
      background: linear-gradient(135deg, #b8860b, #e6c061, #9a7416);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { color: #7c715d; margin: 6px 0 26px; font-size: 0.95rem; }
    label { display: block; text-align: right; font-weight: 600; font-size: 0.9rem; margin: 0 0 8px; color: #4a4234; }
    input {
      width: 100%; font-family: inherit; font-size: 1rem; padding: 13px 15px;
      border: 1.5px solid rgba(124,113,93,0.3); border-radius: 12px; background: #fdfbf6;
      margin-bottom: 18px; transition: border-color .2s, box-shadow .2s;
    }
    input:focus { outline: none; border-color: #c69a2e; box-shadow: 0 0 0 4px rgba(198,154,46,0.25); }
    button {
      width: 100%; font-family: inherit; font-weight: 700; font-size: 1.05rem; cursor: pointer;
      padding: 14px; border: none; border-radius: 50px; color: #3a2c07;
      background: linear-gradient(135deg, #b8860b, #e6c061, #9a7416); background-size: 200% 200%;
      transition: transform .2s, background-position .3s; box-shadow: 0 14px 30px -12px rgba(198,154,46,0.7);
    }
    button:hover { transform: translateY(-2px); background-position: 100% 0; }
    .error { background: #fde8e8; color: #b42318; border-radius: 10px; padding: 10px; margin-bottom: 16px; font-size: .9rem; display: none; }
    .error.show { display: block; }
    .hint { margin-top: 18px; font-size: .8rem; color: #a99; }
  </style>
</head>
<body>
  <form class="card" method="POST" action="/admin/login">
    <div class="logo">Reborn</div>
    <div class="sub">ממשק ניהול האתר</div>
    <div class="error" id="err">שם משתמש או סיסמה שגויים</div>
    <label for="u">שם משתמש</label>
    <input id="u" name="username" type="text" autocomplete="username" required autofocus />
    <label for="p">סיסמה</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required />
    <button type="submit">כניסה</button>
    <div class="hint">לאחר הכניסה תוכלו לערוך טקסטים ולנהל את הגלריה</div>
  </form>
  <script>
    if (new URLSearchParams(location.search).get("error")) {
      document.getElementById("err").classList.add("show");
    }
  </script>
</body>
</html>
