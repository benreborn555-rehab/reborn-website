<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ממשק ניהול Reborn</title>
  <!-- Netlify Identity widget for user authentication -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <style>
    /* =========================================================
       Reborn — Custom Premium Golden Theme for Decap CMS UI
       ========================================================= */
    body {
      font-family: "Noto Sans Hebrew", system-ui, sans-serif !important;
      background-color: #faf6ee !important;
    }

    /* Top Navigation Bar */
    header[class*="AppHeader"] {
      background: linear-gradient(160deg, #211b11, #2a241b) !important;
      border-bottom: 3px solid #c69a2e !important;
      box-shadow: 0 6px 24px -12px rgba(0, 0, 0, 0.5) !important;
    }
    
    /* Brand text inside header */
    span[class*="AppHeaderBrand"] {
      font-weight: 900 !important;
      letter-spacing: 1px !important;
      background: linear-gradient(135deg, #b8860b, #e6c061, #9a7416) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
    }

    /* Main Container / Sidebar background */
    div[class*="SidebarContainer"] {
      background-color: #faf6ee !important;
      border-left: 1px solid rgba(124, 113, 93, 0.2) !important;
    }
    
    /* Navigation Sidebar Links */
    a[class*="SidebarLink"] {
      font-family: "Noto Sans Hebrew", sans-serif !important;
      font-weight: 600 !important;
      color: #7c715d !important;
      border-radius: 8px !important;
      margin: 4px 10px !important;
      padding: 10px 14px !important;
      transition: all 0.2s !important;
    }
    a[class*="SidebarLink"]:hover,
    a[class*="SidebarActiveLink"] {
      background: rgba(198, 154, 46, 0.15) !important;
      color: #9a7416 !important;
      font-weight: 700 !important;
    }

    /* Editor / Form Container Card */
    div[class*="AppCard"] {
      background: #ffffff !important;
      border: 1px solid rgba(124, 113, 93, 0.25) !important;
      border-radius: 18px !important;
      box-shadow: 0 14px 40px -28px rgba(42, 36, 27, 0.3) !important;
      padding: 30px !important;
    }

    /* Editor Input Fields & Labels */
    label[class*="ControlLabel"] {
      font-family: "Noto Sans Hebrew", sans-serif !important;
      font-weight: 700 !important;
      color: #2a241b !important;
      font-size: 0.95rem !important;
      margin-bottom: 8px !important;
    }
    input[id*="field-"], textarea[id*="field-"], select[id*="field-"] {
      font-family: "Noto Sans Hebrew", sans-serif !important;
      font-size: 1rem !important;
      padding: 12px 15px !important;
      border: 1.5px solid rgba(124, 113, 93, 0.25) !important;
      border-radius: 12px !important;
      background: #fdfbf6 !important;
      color: #28231b !important;
      transition: all 0.2s !important;
    }
    input[id*="field-"]:focus, textarea[id*="field-"]:focus {
      border-color: #c69a2e !important;
      box-shadow: 0 0 0 4px rgba(198, 154, 46, 0.22) !important;
      background: #ffffff !important;
      outline: none !important;
    }

    /* Widgets / Objects Containers */
    div[class*="WidgetContainer"] {
      border: 1px solid rgba(124, 113, 93, 0.15) !important;
      border-radius: 14px !important;
      background-color: #faf6ee !important;
      padding: 20px !important;
      margin-bottom: 20px !important;
    }

    /* Buttons (Publish, Save, Delete, Add) */
    button[class*="Button"] {
      font-family: "Noto Sans Hebrew", sans-serif !important;
      font-weight: 700 !important;
      border-radius: 50px !important;
      transition: all 0.2s !important;
    }
    
    /* Primary Action Buttons (like "Publish" / "Save") */
    button[class*="PublishButton"], 
    button[class*="Button-button-default-blue"] {
      background: linear-gradient(135deg, #b8860b, #e6c061, #9a7416) !important;
      color: #3a2c07 !important;
      box-shadow: 0 8px 20px -8px rgba(198, 154, 46, 0.6) !important;
      border: none !important;
    }
    button[class*="PublishButton"]:hover, 
    button[class*="Button-button-default-blue"]:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 12px 24px -6px rgba(198, 154, 46, 0.8) !important;
    }

    /* Secondary Buttons */
    button[class*="Button-button-default-gray"] {
      background: rgba(255, 255, 255, 0.8) !important;
      border: 1px solid rgba(124, 113, 93, 0.3) !important;
      color: #7c715d !important;
    }
    button[class*="Button-button-default-gray"]:hover {
      background: #ffffff !important;
      color: #9a7416 !important;
      border-color: #c69a2e !important;
    }

    /* RTL / Hebrew corrections for Decap UI */
    div[class*="FieldContainer"] {
      text-align: right !important;
    }
  </style>
</head>
<body>
  <!-- Decap CMS core application -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
